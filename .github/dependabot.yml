version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "monthly"
      cooldown:
          default-days: 7
      commit-message:
        prefix: "ci(deps)"
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "monthly"
      cooldown:
          default-days: 7
